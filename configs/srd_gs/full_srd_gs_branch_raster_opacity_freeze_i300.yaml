name: full_srd_gs_branch_raster_opacity_freeze_i300
implementation_status: bounded_ball_i300_control_ready_paperscale_nogo
hypothesis: Freezing opacity updates on top of the M24 reflection/specular freeze should test whether the remaining 300-iteration rendering regression is tied to activated-opacity drift rather than reflection/specular-side parameter drift alone.
what_it_removes: Removes optimizer updates for opacity, reflection_feature, and specular_weight while keeping branch-raster diagnostics, diagnostic branch-gate scheduling, and neutral rendered gate modulation active for a same-budget 300-iteration control.
expected_supporting_result: Successful train/mesh/texture/render/eval chain with raster_feature_chunks diagnostics, opacity/reflection/specular checkpoint drift reduced versus M20/M21/M24, and PSNR/Refl-PSNR higher than M24 without introducing empty meshes or missing metrics.
refuting_result: CUDA failure, empty mesh, fallback branch policy, missing metrics, opacity drift not reduced, or PSNR/Refl-PSNR remaining close to M24.
metrics_to_inspect_first: psnr,refl_psnr,chamfer_distance,f_score,normal_mae,highlight_leakage_score,opacity_activated_mean,reflection_feature_abs_mean,specular_weight_activated_mean,render_gate_weight
train_args: "--enable_srd_gs --srd_rasterize_branch_maps --srd_use_branch_gate --srd_branch_gate_start_iter 10 --srd_branch_gate_ramp_iters 20 --srd_render_gate_start_iter 100000 --srd_render_gate_ramp_iters 0"
train_only_args: "--srd_opacity_lr_scale 0.0 --srd_reflection_feature_lr_scale 0.0 --srd_specular_weight_lr_scale 0.0"
branch_gate_policy: raster_feature_chunks_i300_opacity_reflection_specular_freeze_neutral_render_gate
mesh_mode: surface
texture_mode: specular_free
eval_enabled: true
