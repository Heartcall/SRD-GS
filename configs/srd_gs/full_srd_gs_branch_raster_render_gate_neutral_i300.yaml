name: full_srd_gs_branch_raster_render_gate_neutral_i300
implementation_status: bounded_ball_i300_runtime_validated_rendering_nogo_geometry_partial_paperscale_nogo
hypothesis: Keeping rendered branch-gate modulation neutral at the 300-iteration checkpoint should test whether the M19/M20 PSNR degradation is caused by rendered gate activation rather than branch-raster diagnostics or checkpoint length alone.
what_it_removes: Removes rendered branch-gate modulation through the 300-iteration checkpoint while keeping branch-raster diagnostics and branch-gate diagnostic scheduling active.
expected_supporting_result: Successful train/mesh/texture/render/eval chain with raster_feature_chunks diagnostics, branch_gate_weight reaching 1.0, render_gate_weight staying 0.0, and better PSNR/Refl-PSNR than M20.
refuting_result: CUDA failure, empty mesh, fallback branch policy, missing metrics, branch_gate_weight not reaching 1.0, render_gate_weight not staying 0.0, or PSNR/Refl-PSNR remaining close to M20.
metrics_to_inspect_first: psnr,refl_psnr,chamfer_distance,f_score,normal_mae,highlight_leakage_score,branch_gate_weight,render_gate_weight
train_args: "--enable_srd_gs --srd_rasterize_branch_maps --srd_use_branch_gate --srd_branch_gate_start_iter 10 --srd_branch_gate_ramp_iters 20 --srd_render_gate_start_iter 100000 --srd_render_gate_ramp_iters 0"
branch_gate_policy: raster_feature_chunks_i300_neutral_render_gate
mesh_mode: surface
texture_mode: specular_free
eval_enabled: true
